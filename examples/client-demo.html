<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether-Titan Demo – Client</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
        canvas { border: 2px solid #3c6eff; background: #1e1e2e; box-shadow: 0 0 20px rgba(60,110,255,0.2); }
        #debug { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 8px 12px; border-radius: 8px; font-size: 12px; z-index: 100; pointer-events: none; backdrop-filter: blur(4px); }
        #sim-badge { position: fixed; bottom: 10px; left: 10px; background: #2a1e2a; color: #ffb74d; padding: 4px 10px; border-radius: 20px; font-size: 10px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="debug">🔌 Connecting...</div>
    <div id="sim-badge">⚙️ Sim: 0ms / 0ms / 0%</div>

    <script type="importmap">
        {
            "imports": {
                "../core/SCS76_Codec.js": "../core/SCS76_Codec.js",
                "../core/ClientPrediction.js": "../core/ClientPrediction.js",
                "../core/Reconciliation.js": "../core/Reconciliation.js",
                "../core/RollbackSystem.js": "../core/RollbackSystem.js",
                "../core/NetworkHealth.js": "../core/NetworkHealth.js",
                "../transport/WebSocketTransport.js": "../transport/WebSocketTransport.js",
                "../transport/ConnectionManager.js": "../transport/ConnectionManager.js",
                "../core/InputCodec.js": "../core/InputCodec.js",
                "../core/AetherInterpolator.js": "../core/AetherInterpolator.js"
            }
        }
    </script>

    <script type="module">
        import { SCS76Codec } from '../core/SCS76_Codec.js';
        import { ClientPrediction } from '../core/ClientPrediction.js';
        import { Reconciliation } from '../core/Reconciliation.js';
        import { RollbackSystem } from '../core/RollbackSystem.js';
        import { NetworkHealth } from '../core/NetworkHealth.js';
        import { WebSocketTransport } from '../transport/WebSocketTransport.js';
        import { ConnectionManager } from '../transport/ConnectionManager.js';
        import { InputCodec } from '../core/InputCodec.js';
        import { AetherInterpolator } from '../core/AetherInterpolator.js';

        // ---------- Integração com Dashboard ----------
        const urlParams = new URLSearchParams(window.location.search);
        const sessionCfg = JSON.parse(sessionStorage.getItem('aether_demo_config') || '{}');
        const savedServer = localStorage.getItem('aether_server_url');

        const CONFIG = {
            serverUrl: urlParams.get('server') || savedServer || 'ws://localhost:8080',
            latency: parseInt(urlParams.get('latency')) || sessionCfg.latency || 0,
            jitter: parseInt(urlParams.get('jitter')) || sessionCfg.jitter || 0,
            loss: parseInt(urlParams.get('loss')) || sessionCfg.loss || 0
        };

        console.log('🚀 Aether-Titan Demo | Config:', CONFIG);
        document.getElementById('sim-badge').innerHTML = `🧪 Sim: ${CONFIG.latency}ms ±${CONFIG.jitter}ms | Loss ${CONFIG.loss}%`;

        // ---------- Setup dos módulos ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const debugDiv = document.getElementById('debug');

        let playerState = { x: 400, y: 300, vx: 0, vy: 0 };
        let lastServerState = { x: 400, y: 300 };
        let inputSeq = 0;
        let lastSendTime = 0;

        const prediction = new ClientPrediction();
        const reconciliation = new Reconciliation();
        const rollback = new RollbackSystem();
        const transport = new WebSocketTransport();
        const connMgr = new ConnectionManager(transport);
        const interpolator = new AetherInterpolator();
        const useMockServer = true; // 🛠️ Ative para autoteste local sem Node.js

        // Armazena handler de mensagens para uso no mock
        let inboundHandler = null;
        const originalOnMessage = transport.onMessage.bind(transport);
        transport.onMessage((raw) => {}); // init
        transport.onMessage = (handler) => {
            inboundHandler = handler;
            originalOnMessage(handler);
        };

        // Intercepta o send do transporte para simulação de rede ou mock
        const originalSend = transport.send.bind(transport);
        transport.send = (data) => {
            if (Math.random() * 100 < CONFIG.loss) {
                console.warn('📦 Packet lost (simulated)');
                return;
            }
            const delay = CONFIG.latency + (Math.random() * CONFIG.jitter * 2 - CONFIG.jitter);

            // Mock server interno
            if (useMockServer) {
                const mockState = transport.__mockState || { x: 400, y: 300 };
                transport.__mockState = mockState;
                const input = InputCodec.decode(new Uint8Array(data));
                if (!input) return;
                mockState.x += input.dx;
                mockState.y += input.dy;
                const responder = () => {
                    const ts = Date.now();
                    const packet = SCS76Codec.encode(
                        mockState.x, mockState.y,
                        mockState.x, mockState.y,
                        0, 0,
                        ts & 0xFFFF, input.inputSeq, ts
                    );
                    inboundHandler && inboundHandler(packet.buffer);
                };
                if (delay <= 0) responder(); else setTimeout(responder, delay);
                return;
            }

            // Modo normal (rede real)
            if (delay <= 0) originalSend(data);
            else setTimeout(() => originalSend(data), delay);
        };

        // Controles
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        function sendInput() {
            let dx = 0, dy = 0;
            if (keys.ArrowUp) dy -= 5;
            if (keys.ArrowDown) dy += 5;
            if (keys.ArrowLeft) dx -= 5;
            if (keys.ArrowRight) dx += 5;
            if (dx === 0 && dy === 0) return;
            inputSeq++;
            prediction.applyInput(inputSeq, dx, dy, playerState);
            const packet = InputCodec.encode(inputSeq, dx, dy);
            transport.send(packet.buffer);
        }

        // Mensagens do servidor (snapshots)
        transport.onMessage(async (raw) => {
            const buffer = new Uint8Array(raw);
            const decoded = SCS76Codec.decode(buffer, lastServerState, { x: 0, y: 0 }, 16.66);
            if (!decoded) return;
            const { x, y, ackInputSeq, ts } = decoded;
            lastServerState = { x, y };
            interpolator.push({ x, y, timestampMs: ts });

            const predicted = prediction.getState(ackInputSeq);
            if (predicted) {
                const corrected = reconciliation.reconcile(lastServerState, predicted);
                playerState.x = corrected.x;
                playerState.y = corrected.y;
                rollback.saveState(ackInputSeq, { ...playerState, vx: 0, vy: 0 });
                prediction.clearOldUpTo(ackInputSeq);
            }

            const metrics = { jitter: 5, loss: 0, latency: 20 };
            const health = NetworkHealth.compute(metrics);
            debugDiv.innerHTML = `📍 Pos: (${playerState.x.toFixed(1)}, ${playerState.y.toFixed(1)}) | ❤️ Saúde: ${health} | 🧾 AckSeq: ${ackInputSeq}`;
        });

        // Loop de renderização com interpolação
        let lastRenderTime = performance.now();
        function gameLoop() {
            const now = performance.now();
            const delta = Math.min(33, now - lastRenderTime);
            lastRenderTime = now;
            reconciliation.updateVisual(delta);
            const renderPos = interpolator.getInterpolated(now);
            const drawX = renderPos ? renderPos.x : playerState.x;
            const drawY = renderPos ? renderPos.y : playerState.y;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#3c6eff';
            ctx.fillRect(drawX - 12, drawY - 12, 24, 24);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px monospace';
            ctx.fillText('🐺', drawX-6, drawY-8);
            requestAnimationFrame(gameLoop);
        }

        // Loop de envio de inputs (60hz)
        function inputLoop() {
            const now = Date.now();
            if (now - lastSendTime > 16) {
                sendInput();
                lastSendTime = now;
            }
            setTimeout(inputLoop, 10);
        }

        // --- AUTO-STRESS TESTER (mock-aware, 10s, report) ---
        async function runAutoFunctionTest() {
            const logs = [];
            const startTime = performance.now();
            keys.ArrowDown = true;
            keys.ArrowRight = true;
            const monitor = setInterval(() => {
                const elapsed = performance.now() - startTime;
                if (Math.floor(elapsed) % 100 < 16) {
                    logs.push({
                        time: (elapsed / 1000).toFixed(2),
                        posX: playerState.x.toFixed(2),
                        posY: playerState.y.toFixed(2),
                        seq: inputSeq
                    });
                }
                if (elapsed >= 5000 && keys.ArrowDown) {
                    keys.ArrowDown = false;
                    keys.ArrowUp = true;
                }
                if (elapsed >= 10000) {
                    clearInterval(monitor);
                    keys.ArrowUp = false;
                    keys.ArrowRight = false;
                    generateReportFile(logs);
                }
            }, 16);
        }

        function generateReportFile(data) {
            const reportHeader = `=== AETHER-TITAN PROTOCOL REPORT ===\n` +
                                 `Data: ${new Date().toLocaleString()}\n` +
                                 `Config: Latency=${CONFIG.latency}ms, Jitter=${CONFIG.jitter}ms, Loss=${CONFIG.loss}%\n` +
                                 `------------------------------------\n\n`;
            const tableHeader = "Tempo(s) | PosX | PosY | Seq\n";
            const rows = data.map(d => `${d.time}s | ${d.posX} | ${d.posY} | ${d.seq}`).join('\n');
            const finalContent = reportHeader + tableHeader + rows;
            const blob = new Blob([finalContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `aether_sim_report_${Date.now()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            console.log("📂 Relatório gerado e baixado com sucesso!");
        }

        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        (async () => {
            if (useMockServer) {
                console.warn("🛠️ MODO AUTOTESTE LOCAL ATIVADO: Servidor fantasma interno.");
                gameLoop();
                inputLoop();
                setTimeout(runAutoFunctionTest, 1000);
                return;
            }
            try {
                await connMgr.connect(CONFIG.serverUrl);
                console.log('✅ Conectado ao servidor');
                gameLoop();
                inputLoop();
                setTimeout(runAutoFunctionTest, 1500);
            } catch (err) {
                debugDiv.innerHTML = `❌ Falha na conexão: ${err.message}`;
                console.error(err);
            }
        })();
    </script>
</body>
</html>
